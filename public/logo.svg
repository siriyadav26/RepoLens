<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#046276;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f8ca3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#046276;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0f8ca3;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" stroke="url(#ringGrad)" stroke-width="4" fill="none"/>
  <!-- Lens circle -->
  <circle cx="85" cy="85" r="45" stroke="url(#lensGrad)" stroke-width="7" fill="rgba(4,98,118,0.06)"/>
  <!-- Code brackets inside lens -->
  <text x="85" y="93" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="url(#lensGrad)">&lt;/&gt;</text>
  <!-- Lens handle -->
  <line x1="118" y1="118" x2="155" y2="155" stroke="url(#lensGrad)" stroke-width="10" stroke-linecap="round"/>
  <!-- AI dot -->
  <circle cx="152" cy="60" r="12" fill="url(#lensGrad)"/>
  <text x="152" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff">AI</text>
</svg>